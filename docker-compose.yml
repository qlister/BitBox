# =============================================================================
# BitBox/docker-compose.yml
#
# Combined orchestrator: starts Portal, Planner, Purchasing, and ERP Query Engine containers.
#
# Each project's Dockerfile lives in its own subfolder.
# For developing a single project in isolation, use the docker-compose.yml
# inside portal/, planner/, purchasing/, or erp_query_engine/ respectively.
#
# Usage (from the BitBox/ folder):
#   docker-compose up --build    # first build or after Dockerfile changes
#   docker-compose up -d         # start all in background
#   docker-compose logs -f       # tail logs from all containers
#   docker-compose down          # stop and remove all containers
#
# Services:
#   portal            → http://localhost:8081  (Python 3.12 FastAPI + uvicorn)
#   planner           → http://localhost:8082  (Python FastAPI + OR-Tools)
#   purchasing        → http://localhost:8084  (Python FastAPI)
#   erp_query_engine  → http://localhost:8000  (Python FastAPI + Vanna + MCP)
#
# The portal reaches the ERP Query Engine via http://erp_query_engine:8000 — 
# set ERP_QUERY_URL in .env: ERP_QUERY_URL=http://erp_query_engine:8000
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # BitBox Portal  (Python 3.12 FastAPI + uvicorn, port 8081)
  # ---------------------------------------------------------------------------
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: bitbox_portal_staging
    ports:
      - "8081:80"
    env_file: .env
    extra_hosts:
      - "BB-DC01:172.16.1.2"
    restart: unless-stopped
    image: bb-lnx02:5000/bitbox-portal

  # ---------------------------------------------------------------------------
  # BitBox Planner  (Python FastAPI + OR-Tools)
  # ---------------------------------------------------------------------------
  planner:
    build:
      context: ./planner
      dockerfile: Dockerfile
    container_name: bitbox_planner_staging
    # SHARED source of truth for DB_DATABASE, APP_ENV, INTRANET_LOG_URL, 
    # LOG_API_KEY, and DB_UID (bitbox_svc) etc.
    # This is what guarantees the env / database pill in the planner UI 
    # matches the database the planner backend is actually connected to.
    # See PORTAL_CONTRACT.md → "Env handling" for the contract requirement.
    env_file: .env
    extra_hosts:
      - "BB-DC01:172.16.1.2"
    depends_on:
      - portal
    restart: unless-stopped
    image: bb-lnx02:5000/bitbox-planner

  # ---------------------------------------------------------------------------
  # BitBox Purchasing  (Python FastAPI)
  # ---------------------------------------------------------------------------
  purchasing:
    build:
      context: ./purchasing
      dockerfile: Dockerfile
    container_name: bitbox_purchasing_staging
    # SHARED source of truth for DB_DATABASE, APP_ENV, INTRANET_LOG_URL, 
    # LOG_API_KEY, and DB_UID (bitbox_svc) etc.
    # This is what guarantees the env / database pill in the purchasing UI 
    # matches the database the purchasing backend is actually connected to.
    # See PORTAL_CONTRACT.md → "Env handling" for the contract requirement.
    env_file: .env
    extra_hosts:
      - "BB-DC01:172.16.1.2"
    depends_on:
      - portal
    restart: unless-stopped
    image: bb-lnx02:5000/bitbox-purchasing

  # ---------------------------------------------------------------------------
  # ERP Query Engine  (Python FastAPI + Vanna + MCP)
  # ---------------------------------------------------------------------------
  erp_query_engine:
    build:
      context: ./erp_query_engine
      dockerfile: Dockerfile
    container_name: erp-query-engine_staging
    ports:
      - "8000:8000"
    env_file:
      - .env
      - ./erp_query_engine/.env
    environment:
      - MSSQL_SERVER=${DB_SERVER}
      - MSSQL_DATABASE=${DB_DATABASE}
      - MSSQL_USER=erp_mcp_read
      - MSSQL_PASSWORD=ErpMcpRead2026!
      - HOST_MACHINE_NAME=${HOSTNAME:-${COMPUTERNAME:-unknown}}
    volumes:
      # ChromaDB training data persists across container restarts
      - erp_chromadb_data:/app/chromadb_data
      # Training config — bind mount so edits take effect without rebuilding
      - ./erp_query_engine/training:/app/training:ro
    extra_hosts:
      - "BB-DC01:172.16.1.2"
    restart: unless-stopped
    image: bb-lnx02:5000/erp-query-engine

volumes:
  erp_chromadb_data:
