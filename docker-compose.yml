# =============================================================================
# BitBox/docker-compose.yml
#
# Combined orchestrator: starts Portal, Planner, and Purchasing containers.
#
# Each project's Dockerfile lives in its own subfolder.
# For developing a single project in isolation, use the docker-compose.yml
# inside portal/, planner/, or purchasing/ respectively.
#
# Usage (from the BitBox/ folder):
#   docker-compose up --build    # first build or after Dockerfile changes
#   docker-compose up -d         # start all in background
#   docker-compose logs -f       # tail logs from all containers
#   docker-compose down          # stop and remove all containers
#
# Services:
#   portal      → http://localhost:8081  (Python 3.12 FastAPI + uvicorn)
#   planner     → http://localhost:8082  (Python FastAPI + OR-Tools)
#   purchasing  → http://localhost:8084  (Python FastAPI)
#
# ERP Query Engine is a SEPARATE project (c:\Users\qlister\AI\erp_query_engine).
# Start it independently from its own docker-compose.yml (port 8000 on the host).
# The portal reaches it via host.docker.internal:8000 — set ERP_QUERY_URL in
# portal/.env:  ERP_QUERY_URL=http://host.docker.internal:8000
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # BitBox Portal  (Python 3.12 FastAPI + uvicorn, port 8081)
  # ---------------------------------------------------------------------------
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: bitbox_portal
    ports:
      - "8081:80"
    volumes:
      - ./portal/backend:/app/backend   # live-mount: Python changes without rebuild
      - ./portal/static:/app/static     # live-mount: HTML/JS changes without rebuild
    env_file: ./portal/.env
    extra_hosts:
      - "BB-DC01:172.16.1.2"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # BitBox Planner  (Python FastAPI + OR-Tools, port 8082)
  # ---------------------------------------------------------------------------
  planner:
    build:
      context: ./planner
      dockerfile: Dockerfile
    container_name: bitbox_planner
    ports:
      - "8082:8000"
    volumes:
      - ./planner/backend:/app/backend   # live-mount: Python changes without rebuild
      - ./planner/static:/app/static     # live-mount: JS/HTML changes without rebuild
    # Two env files, layered. Later file wins for any duplicate key.
    #   1. portal/.env   -- the SHARED source of truth for DB_DATABASE,
    #                       APP_ENV, INTRANET_LOG_URL, LOG_API_KEY, etc.
    #                       This is what guarantees the env / database pill
    #                       in the planner UI matches the database the
    #                       planner backend is actually connected to —
    #                       both come from the same DB_DATABASE here.
    #   2. planner/.env  -- planner-specific overrides. Notably DB_UID /
    #                       DB_PWD = bitbox_svc (planner needs WRITE access
    #                       to BitBoxPlanner.* which portal_user does not).
    # See PORTAL_CONTRACT.md → "Env handling" for the contract requirement.
    # When developing planner standalone, planner/docker-compose.yml uses
    # planner/.env on its own (it's self-contained for that purpose).
    env_file:
      - ./portal/.env
      - ./planner/.env
    extra_hosts:
      - "BB-DC01:172.16.1.2"
    depends_on:
      - portal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # BitBox Purchasing  (Python FastAPI, port 8084)
  # ---------------------------------------------------------------------------
  purchasing:
    build:
      context: ./purchasing
      dockerfile: Dockerfile
    container_name: bitbox_purchasing
    ports:
      - "8084:8000"
    volumes:
      - ./purchasing/backend:/app/backend   # live-mount: Python changes without rebuild
      - ./purchasing/static:/app/static     # live-mount: JS/HTML changes without rebuild
    # Two env files, layered. Later file wins for any duplicate key.
    #   1. portal/.env       -- SHARED source of truth for DB_DATABASE,
    #                           APP_ENV, INTRANET_LOG_URL, LOG_API_KEY etc.
    #   2. purchasing/.env   -- purchasing-specific overrides. Notably
    #                           DB_UID / DB_PWD = bitbox_svc (write access
    #                           to BitBoxPurchasing.*) and the
    #                           DB_PSCR_SQL_AUTH_* `sa` workaround for
    #                           PSCRInsertSDK (only honoured in live/beta
    #                           — see purchasing/AGENTS.md → PSCR section).
    # See PORTAL_CONTRACT.md → "Env handling" for the contract requirement.
    # When developing purchasing standalone, purchasing/docker-compose.yml
    # uses purchasing/.env on its own.
    env_file:
      - ./portal/.env
      - ./purchasing/.env
    extra_hosts:
      - "BB-DC01:172.16.1.2"
    depends_on:
      - portal
    restart: unless-stopped
